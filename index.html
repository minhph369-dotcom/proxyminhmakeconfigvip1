<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MinhMakeConfig - AimLock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: #a855f7;
            --deep-bg: #090110;
            --card-bg: rgba(18, 4, 32, 0.8);
            --accent: #a855f7;
            --accent2: #7e22ce;
            --border-glow: rgba(168, 85, 247, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #060010;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 30% 40%, rgba(168, 85, 247, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(126, 34, 206, 0.08) 0%, transparent 60%);
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(168, 85, 247, 0.25) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.4;
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.6);
            border-radius: 32px;
            position: relative;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.35), 0 10px 30px rgba(0, 0, 0, 0.7);
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #a855f7, #7e22ce, #a855f7, #7e22ce);
            background-size: 400% 400%;
            border-radius: 34px;
            z-index: -1;
            animation: borderGlow 8s linear infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
            filter: blur(10px);
        }

        .premium-card:hover::before {
            opacity: 0.7;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-input {
            background: rgba(18, 4, 32, 0.9);
            border: 1.5px solid rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3), inset 0 0 8px rgba(168, 85, 247, 0.15);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .glass-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6), inset 0 0 12px rgba(168, 85, 247, 0.3);
            background: #1b0828;
            transform: scale(1.01);
        }

        .btn-gradient-premium {
            background: linear-gradient(135deg, #1b0828 0%, #2d0a3d 100%);
            border: 1.5px solid rgba(168, 85, 247, 0.9);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-gradient-premium:hover {
            background: #2f1142;
            border-color: #c084fc;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.9);
            transform: translateY(-2px);
        }
        .btn-gradient-premium:active { transform: scale(0.97); }
        .btn-gradient-premium::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(168, 85, 247, 0.25), transparent);
            transform: rotate(45deg) translate(-100%, -100%);
            transition: transform 0.6s ease;
        }
        .btn-gradient-premium:hover::after {
            transform: rotate(45deg) translate(100%, 100%);
        }

        .btn-unlock, .btn-cert {
            background: rgba(18, 4, 32, 0.9);
            border: 1px solid rgba(168, 85, 247, 0.7);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .btn-unlock:hover, .btn-cert:hover {
            border-color: #c084fc;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8);
            background: #1b0828;
            transform: translateY(-1px);
        }

        .switch { position: relative; display: inline-block; width: 56px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(168, 85, 247, 0.2);
            border: 1.5px solid rgba(168, 85, 247, 0.8);
            transition: 0.3s; border-radius: 34px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }
        .slider:before {
            position: absolute; content: "";
            height: 22px; width: 22px;
            left: 3px; bottom: 3px;
            background: #a855f7;
            transition: 0.3s; border-radius: 50%;
            box-shadow: 0 0 25px #a855f7;
        }
        input:checked + .slider {
            background: #a855f7;
            border-color: #a855f7;
            box-shadow: 0 0 40px #a855f7;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
            background: #000;
            box-shadow: 0 0 30px #a855f7;
        }

        .cyber-glow {
            text-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168, 85, 247, 0.9), 0 0 60px rgba(126, 34, 206, 0.7);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            0% { text-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168, 85, 247, 0.8); }
            100% { text-shadow: 0 0 30px #c084fc, 0 0 60px rgba(168, 85, 247, 1), 0 0 80px rgba(126, 34, 206, 0.9); }
        }

        .ip-badge {
            background: rgba(10, 3, 20, 0.9);
            border: 1.5px solid rgba(168, 85, 247, 0.9);
            color: #fff;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            text-shadow: 0 0 20px #a855f7;
            font-family: monospace;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            animation: badgePulse 2.5s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
            50% { box-shadow: 0 0 35px rgba(168, 85, 247, 0.8); }
        }

        .accent-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #a855f7, #7e22ce, #a855f7, transparent);
            width: 70%;
            margin: 10px auto;
            box-shadow: 0 0 20px #a855f7;
            animation: lineShimmer 4s infinite;
        }
        @keyframes lineShimmer {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .countdown-danger {
            animation: danger-pulse 2s infinite;
        }
        @keyframes danger-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
            50% { box-shadow: 0 0 35px rgba(168, 85, 247, 0.9); }
        }

        #toastContent {
            box-shadow: 0 0 45px rgba(168, 85, 247, 0.7);
            border: 1.5px solid rgba(168, 85, 247, 0.9);
            background: rgba(10, 2, 20, 0.95);
            backdrop-filter: blur(8px);
            animation: toastIn 0.5s ease-out;
        }
        @keyframes toastIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .mod-item-active {
            border-color: #a855f7 !important;
            background: rgba(168, 85, 247, 0.2) !important;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.7);
            animation: activeModGlow 2s infinite alternate;
        }
        @keyframes activeModGlow {
            0% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
            100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.9); }
        }

        .aim-selected {
            border-color: rgba(168, 85, 247, 0.9) !important;
            background: rgba(168, 85, 247, 0.15) !important;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
        }

        .disabled { opacity: 0.5; pointer-events: none; filter: grayscale(30%); }

        #modList > div {
            transition: all 0.3s ease;
            position: relative; z-index: 1;
            border: 1px solid transparent;
        }
        #modList > div:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.7);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
            transform: translateY(-2px);
        }

        .fa-bullseye, .fa-key, .fa-crosshairs, .fa-server {
            filter: drop-shadow(0 0 8px #a855f7);
        }

        .server-box { animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #btn-submit-main span { position: relative; z-index: 2; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 relative">
    <div class="bg-layer"></div>

    <div class="w-full max-w-[440px] space-y-6 my-6 relative z-10">

            <div>

            <div class="flex flex-col items-end gap-1 px-4 py-2 rounded-2xl bg-black/70 backdrop-blur-md border border-[#a855f7]/40 shadow-[0_0_35px_rgba(168,85,247,0.4)]">

                                    <i class="fa-solid fa-bullseye text-[#a855f7] text-lg"></i>

                    <button type="button" id="btn-submit-main" onclick="handleInitialStep()" class="w-full py-4.5 rounded-2xl btn-gradient-premium text-white font-bold text-[14px] uppercase tracking-[0.15em] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 h-14">

                            <i class="fa-solid fa-unlock-keyhole text-xs"></i> GET KEY
                        </a>
                        <a href="https://www.mediafire.com/file/xbrk25yla1xxg89/Signed_ProxyPin.mobileconfig/file" target="_blank" class="py-3.5 rounded-2xl btn-cert text-white font-bold text-[10px] uppercase tracking-[0.1em] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">

                <i class="fa-solid fa-code text-xs"></i> zenithsolitude
            </p>
        </div>
    </div>

    <div id="toast" style="position:fixed;top:24px;left:50%;transform:translate(-50%,-20px);opacity:0;visibility:hidden;z-index:110;width:90%;max-width:400px;transition:0.4s cubic-bezier(0.175,0.885,0.32,1.275);">
        <div id="toastContent" class="p-4 rounded-2xl text-white text-sm font-medium"></div>
    </div>

    <audio id="bgMusic" src="quy.mp3" autoplay loop preload="auto"></audio>

    <script>
        let clientIP = null;
        let currentActiveMod = null, currentActiveFile = null;
        let currentServer = 'server.zenithsolitude.store', currentPort = 5560;
        let currentKey = null, isKeyChecked = false, expiresAt = null, countdownInterval = null, statusCheckInterval = null;
        let selectedAimFile = null, selectedAimName = null;
        let cooldownTimer = null, cooldownRemaining = 0;
        const COOLDOWN_SECONDS = 5;
        let modList = [];

        async function fetchRealIP() {
            try {
                const resp = await fetch('https://api4.ipify.org?format=json');
                const data = await resp.json();
                clientIP = data.ip;
                document.getElementById('clientIpDisplay').innerText = clientIP;
            } catch(e) {
                document.getElementById('clientIpDisplay').innerText = 'Lỗi lấy IP';
            }
        }
        fetchRealIP();

        async function loadModList() {
            try {
                const fd = new FormData();
                fd.append('action', 'get_aims');
                const resp = await fetch(window.location.href, { method: 'POST', body: fd });
                const data = await resp.json();
                if (data.status === 'success' && data.aims) {
                    modList = data.aims.map(a => ({
                        file: a.file,
                        name: a.name,
                        icon: a.icon || 'fa-crosshairs',
                        desc: a.desc || '',
                        badge: a.badge || 'SAFE',
                        server: a.server || 'server.zenithsolitude.store',
                        port: a.port || 5560
                    }));
                } else {
                    modList = [
                        { file: 'aim_dragon2.txt', name: 'Aim Drag On 2.0', icon: 'fa-bolt', desc: 'Kéo aim siêu mượt', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                        { file: 'aim_chest.txt', name: 'Aim Chest', icon: 'fa-crosshairs', desc: 'Tự động aim vào ngực', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                        { file: 'aim_neck_dragon2.txt', name: 'Aim Neck Drag 2.0', icon: 'fa-circle-dot', desc: 'Aim vào cổ', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                        { file: 'aim_magic_bullet.txt', name: 'Magic Bullet', icon: 'fa-magic', desc: 'Đạn ma thuật', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 }
                    ];
                }
            } catch (e) {
                modList = [
                    { file: 'aim_dragon2.txt', name: 'Aim Drag On 2.0', icon: 'fa-bolt', desc: 'Kéo aim siêu mượt', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                    { file: 'aim_chest.txt', name: 'Aim Chest', icon: 'fa-crosshairs', desc: 'Tự động aim vào ngực', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                    { file: 'aim_neck_dragon2.txt', name: 'Aim Neck Drag 2.0', icon: 'fa-circle-dot', desc: 'Aim vào cổ', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 },
                    { file: 'aim_magic_bullet.txt', name: 'Magic Bullet', icon: 'fa-magic', desc: 'Đạn ma thuật', badge: 'SAFE', server: 'server.zenithsolitude.store', port: 5560 }
                ];
            }
            renderModList();
        }

        function renderModList() {
            const container = document.getElementById('modList');
            if (!container) return;
            container.innerHTML = modList.map(mod => {
                const isActive = (currentActiveFile === mod.file);
                const isSelected = (!isActive && selectedAimFile === mod.file);
                let extraClass = '';
                if (isActive) extraClass = 'mod-item-active';
                else if (isSelected) extraClass = 'aim-selected';
                return `<div class="flex items-center justify-between p-3 rounded-xl bg-black/40 border cursor-pointer transition-all relative ${extraClass} ${!isActive && !isSelected ? 'border-white/30 text-gray-300 hover:border-[#a855f7]/70 hover:bg-white/10' : ''}" onclick="selectAim('${mod.file}', '${mod.name}')">
                    <div class="flex items-center gap-2.5">
                        <i class="fa-solid ${mod.icon} text-[#a855f7]/80 text-sm"></i>
                        <div><span class="text-[12px] font-bold">${mod.name}</span><p class="text-[9px] text-white/50">${mod.desc}</p></div>
                        ${isActive ? '<span class="text-[8px] font-black px-1.5 py-0.5 rounded-md border border-[#a855f7]/70 bg-[#a855f7]/30 text-white uppercase shadow-[0_0_10px_#a855f7]">ON</span>' : ''}
                    </div>
                    <i class="fa-solid ${isActive ? 'fa-check-circle text-[#a855f7] shadow-[0_0_10px_#a855f7] rounded-full' : (isSelected ? 'fa-dot-circle text-[#a855f7]/80' : 'fa-chevron-right text-white/50')} text-xs"></i>
                </div>`;
            }).join('');
        }

        function saveState(key, mod, file, exp, server, port) {
            const state = { key, modName: mod, fileName: file, expiresAt: exp, server, port, timestamp: Date.now() };
            localStorage.setItem('MINH_AIM_state', JSON.stringify(state));
            document.cookie = `minh_aim_state=${encodeURIComponent(JSON.stringify(state))}; max-age=${30*24*60*60}; path=/; SameSite=Lax`;
        }
        function loadState() { try { return JSON.parse(localStorage.getItem('ZENITH_AIM_state')); } catch(e) { return null; } }
        function loadStateFromCookie() {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; zenith_aim_state=`);
            if (parts.length === 2) try { return JSON.parse(decodeURIComponent(parts.pop().split(';').shift())); } catch(e) { return null; }
            return null;
        }
        function clearState() {
            localStorage.removeItem('MINH_AIM_state');
            document.cookie = 'minh_aim_state=; max-age=0; path=/';
            isKeyChecked = false; currentKey = null; expiresAt = null;
            stopCountdown(); stopStatusCheck();
        }

        function startCountdown(exp) { stopCountdown(); expiresAt = exp; updateCountdown(); countdownInterval = setInterval(updateCountdown, 1000); }
        function stopCountdown() { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; } }
        function updateCountdown() {
            const timer = document.getElementById('countdownTimer'), box = document.getElementById('countdownBox');
            if (!timer || !expiresAt) return;
            const rem = expiresAt - Math.floor(Date.now() / 1000);
            if (rem <= 0) { timer.innerText = 'HẾT HẠN'; box.className = 'flex items-center gap-2 px-3 py-2 rounded-xl countdown-danger bg-[#a855f7]/20 border border-[#a855f7]/60'; handleExpired(); return; }

        async function handleExpired() {
            stopCountdown(); stopStatusCheck();
            if (currentKey) {
                const fd = new FormData(); fd.append('action', 'remove_ip'); fd.append('key_code', currentKey); fd.append('client_ip', clientIP);
                await fetch(window.location.href, { method: 'POST', body: fd }).catch(() => {});
            }

        }

        function startStatusCheck(key) {

                const fd = new FormData(); fd.append('action', 'check_status'); fd.append('key_code', key);
                fd.append('browser_uuid', document.getElementById('uuidField').value);
                fd.append('client_ip', clientIP);
                if (currentActiveFile) fd.append('file_name', currentActiveFile);
                try {
                    const resp = await fetch(window.location.href, { method: 'POST', body: fd });

                            startCountdown(data.data.expires_at);

        function stopStatusCheck() { if (statusCheckInterval) { clearInterval(statusCheckInterval); statusCheckInterval = null; } }

        function updateStatusUI(modName, fileName, server = null, port = null) {
            const statusBox = document.getElementById('statusBox'), serverBox = document.getElementById('serverBox'),
                  modEl = document.getElementById('statusModName'), toggle = document.getElementById('toggleSwitch');
            if (modName && fileName) {
                statusBox.classList.remove('hidden'); serverBox.classList.remove('hidden');
                modEl.innerText = modName; toggle.checked = true;
                currentActiveMod = modName; currentActiveFile = fileName;
                if (server) currentServer = server;
                if (port) currentPort = port;
                renderServerInfo(currentServer, currentPort);
                document.getElementById('btnText').innerHTML = 'TẮT AIM';
                selectedAimFile = null; selectedAimName = null;
                document.getElementById('aimSelector').classList.add('hidden');
            } else {
                statusBox.classList.add('hidden'); serverBox.classList.add('hidden');
                modEl.innerText = '-'; toggle.checked = false;
                currentActiveMod = null; currentActiveFile = null;
                document.getElementById('btnText').innerHTML = 'KÍCH HOẠT AIM';
                stopCountdown();
                selectedAimFile = null; selectedAimName = null;

            renderModList();
        }

        function renderServerInfo(server, port) {
            document.getElementById('serverHost').innerText = server;
            document.getElementById('serverPort').innerText = port;
        }

        function startCooldown() {
            if (cooldownTimer) clearInterval(cooldownTimer);
            cooldownRemaining = COOLDOWN_SECONDS;
            document.getElementById('aimSelector').classList.add('disabled');
            document.getElementById('btn-submit-main').classList.add('disabled');
            document.getElementById('btnText').innerHTML = `VUI LÒNG CHỜ ${cooldownRemaining}s`;
            cooldownTimer = setInterval(() => {
                cooldownRemaining--;
                if (cooldownRemaining <= 0) {
                    clearInterval(cooldownTimer); cooldownTimer = null;
                    document.getElementById('aimSelector').classList.remove('disabled');
                    document.getElementById('btn-submit-main').classList.remove('disabled');
                    document.getElementById('btnText').innerHTML = 'KÍCH HOẠT AIM';
                } else {
                    document.getElementById('btnText').innerHTML = `VUI LÒNG CHỜ ${cooldownRemaining}s`;
                }

        }

        function clearCooldown() {
            if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
            cooldownRemaining = 0;
            document.getElementById('aimSelector').classList.remove('disabled');
            document.getElementById('btn-submit-main').classList.remove('disabled');
            document.getElementById('btnText').innerHTML = 'KÍCH HOẠT AIM';

        function selectAim(file, name) {
            if (currentActiveMod) { showToast("Vui lòng tắt aim hiện tại trước khi chọn aim khác!"); return; }
            if (cooldownTimer || cooldownRemaining > 0) { showToast(`Vui lòng chờ ${cooldownRemaining}s trước khi thao tác!`); return; }
            selectedAimFile = file; selectedAimName = name;
            const aim = modList.find(m => m.file === file);
            if (aim) { currentServer = aim.server; currentPort = aim.port; }
            renderModList();
        }

        async function handleInitialStep() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) return showToast("Vui lòng nhập License Key!");
            if (currentActiveMod && currentActiveFile) { await deactivateCurrentAim(); return; }

            if (!isKeyChecked || currentKey !== key) {
                const btn = document.getElementById('btn-submit-main'), btnText = document.getElementById('btnText');
                btn.disabled = true; btnText.innerHTML = 'ĐANG KIỂM TRA...';
                showToast("⏳ Đang kiểm tra key...");
                const fd = new FormData(); fd.append('action', 'check_key'); fd.append('key_code', key);
                fd.append('browser_uuid', document.getElementById('uuidField').value);
                if (clientIP) fd.append('client_ip', clientIP);
                try {
                    const resp = await fetch(window.location.href, { method: 'POST', body: fd });
                    const data = await resp.json();
                    if (data.status === 'success') {
                        isKeyChecked = true; currentKey = key;
                        const exp = data.expires_at || null;
                        if (data.activated && data.activation_data) {
                            const ad = data.activation_data;
                            updateStatusUI(ad.mod || ad.aim, ad.file, ad.server, ad.port);
                            if (exp) { startCountdown(exp); startStatusCheck(key); }
                            saveState(key, ad.mod || ad.aim, ad.file, exp, ad.server, ad.port);
                            btn.disabled = false;
                            document.getElementById('aimSelector').classList.add('hidden');
                            return;
                        }
                        document.getElementById('aimSelector').classList.remove('hidden');
                        showToast("✅ " + data.message);
                        btnText.innerHTML = 'CHỌN AIM RỒI KÍCH HOẠT';
                    } else {
                        isKeyChecked = false; currentKey = null;
                        showToast("❌ " + (data.message || 'Key không hợp lệ'));
                    }
                } catch(e) { showToast("❌ Lỗi kết nối"); }
                btn.disabled = false;
                if (!currentActiveMod) btnText.innerHTML = 'KÍCH HOẠT AIM';
                return;
            }

            if (!selectedAimFile) { showToast("Vui lòng chọn Aim trước!"); return; }
            if (cooldownTimer || cooldownRemaining > 0) { showToast(`Vui lòng chờ ${cooldownRemaining}s trước khi thao tác!`); return; }
            await activateMod(selectedAimFile, selectedAimName);
        }

        async function activateMod(fileName, modName) {
            const key = currentKey;
            if (!clientIP) return showToast("❌ Chưa lấy được IP!");
            showToast("⏳ Đang kích hoạt " + modName + "...");
            const fd = new FormData(); fd.append('action', 'add_ip'); fd.append('key_code', key);
            fd.append('file_name', fileName); fd.append('mod_type', modName);
            fd.append('browser_uuid', document.getElementById('uuidField').value);
            fd.append('client_ip', clientIP);
            try {
                const resp = await fetch(window.location.href, { method: 'POST', body: fd });
                const data = await resp.json();
                if (data.status === 'success') {
                    updateStatusUI(modName, fileName, data.server, data.port);
                    document.getElementById('aimSelector').classList.add('hidden');
                    if (data.expires_at) { startCountdown(data.expires_at); startStatusCheck(key); saveState(key, modName, fileName, data.expires_at, data.server, data.port); }
                    else saveState(key, modName, fileName, null, data.server, data.port);
                    showToast("✅ Kích hoạt " + modName + " thành công!");
                } else {
                    showToast("❌ " + (data.message || 'Lỗi'));
                    if (data.message.includes('đã được kích hoạt')) { clearState(); updateStatusUI(null, null); }
                }
            } catch(e) { showToast("❌ Lỗi kết nối"); }
        }

        async function deactivateCurrentAim() {
            if (!currentActiveFile || !currentActiveMod || !currentKey) return;
            if (!clientIP) return showToast("❌ Chưa lấy được IP!");
            showToast("⏳ Đang tắt " + currentActiveMod + "...");
            const fd = new FormData(); fd.append('action', 'remove_ip'); fd.append('key_code', currentKey);
            fd.append('file_name', currentActiveFile); fd.append('mod_type', currentActiveMod);
            fd.append('client_ip', clientIP);
            try {
                const resp = await fetch(window.location.href, { method: 'POST', body: fd });
                const data = await resp.json();
                if (data.status === 'success') {
                    updateStatusUI(null, null);
                    clearState();
                    document.getElementById('aimSelector').classList.remove('hidden');
                    showToast("✅ Đã tắt aim. Chờ 5s để kích hoạt aim khác.");
                    startCooldown();
                } else {
                    showToast("❌ " + (data.message || 'Lỗi'));
                }
            } catch(e) { showToast("❌ Lỗi kết nối"); }
        }

        function toggleMod() {
            const toggle = document.getElementById('toggleSwitch');
            if (!toggle.checked && currentActiveMod) { deactivateCurrentAim(); }
            else if (!toggle.checked && !currentActiveMod) { toggle.checked = true; }
        }

            setTimeout(() => { t.style.opacity = '0'; t.style.visibility = 'hidden'; t.style.transform = 'translate(-50%, -20px)'; }, 4000);
